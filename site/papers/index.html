<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="x-ua-compatible" content="ie=edge" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />
        <title>Papers | Enrique Matta</title>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap");

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #eaf6ff;
                --surface: rgba(255, 255, 255, 0.76);
                --surface-strong: rgba(255, 255, 255, 0.9);
                --surface-hover: rgba(186, 230, 253, 0.72);
                --border: rgba(56, 189, 248, 0.18);
                --border-hover: rgba(14, 165, 233, 0.4);
                --sky: #38bdf8;
                --cyan: #0ea5e9;
                --text: #12324a;
                --muted: #5f7f98;
                --glow: 0 20px 42px rgba(56, 189, 248, 0.2);
            }

            html,
            body {
                min-height: 100%;
            }

            body {
                background:
                    radial-gradient(
                        circle at top right,
                        rgba(125, 211, 252, 0.45) 0%,
                        transparent 38%
                    ),
                    radial-gradient(
                        circle at bottom left,
                        rgba(186, 230, 253, 0.78) 0%,
                        transparent 42%
                    ),
                    linear-gradient(
                        180deg,
                        #f9fdff 0%,
                        var(--bg) 56%,
                        #dbeffd 100%
                    );
                color: var(--text);
                font-family:
                    "Inter",
                    system-ui,
                    -apple-system,
                    sans-serif;
                padding: 3rem 1.5rem 4rem;
                position: relative;
                overflow-x: hidden;
            }

            .blob {
                position: fixed;
                border-radius: 50%;
                filter: blur(90px);
                pointer-events: none;
                z-index: 0;
            }

            .blob-1 {
                width: 560px;
                height: 560px;
                background: radial-gradient(
                    circle,
                    rgba(56, 189, 248, 0.18) 0%,
                    transparent 70%
                );
                top: -180px;
                right: -120px;
            }

            .blob-2 {
                width: 460px;
                height: 460px;
                background: radial-gradient(
                    circle,
                    rgba(14, 165, 233, 0.16) 0%,
                    transparent 70%
                );
                bottom: -140px;
                left: -140px;
            }

            .grid {
                position: fixed;
                inset: 0;
                background-image:
                    linear-gradient(
                        rgba(14, 165, 233, 0.05) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        90deg,
                        rgba(14, 165, 233, 0.05) 1px,
                        transparent 1px
                    );
                background-size: 52px 52px;
                pointer-events: none;
                z-index: 0;
            }

            .spotlight {
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 0;
                background: radial-gradient(
                    600px circle at var(--mx, 50%) var(--my, 50%),
                    rgba(56, 189, 248, 0.12) 0%,
                    transparent 60%
                );
                transition: background 0.1s ease;
            }

            .shell {
                position: relative;
                z-index: 1;
                max-width: 780px;
                margin: 0 auto;
            }

            .back-link {
                display: inline-flex;
                align-items: center;
                gap: 0.55rem;
                text-decoration: none;
                color: var(--muted);
                font-family: "JetBrains Mono", monospace;
                font-size: 0.82rem;
                margin-bottom: 1.5rem;
            }

            .back-link:hover {
                color: var(--cyan);
            }

            .hero {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 24px;
                padding: 1.9rem;
                box-shadow: var(--glow);
                backdrop-filter: blur(10px);
                margin-bottom: 1.2rem;
            }

            .eyebrow {
                display: inline-flex;
                align-items: center;
                gap: 0.55rem;
                font-family: "JetBrains Mono", monospace;
                font-size: 0.78rem;
                color: var(--muted);
                letter-spacing: 0.04em;
                text-transform: uppercase;
                margin-bottom: 0.95rem;
            }

            .eyebrow-dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--cyan);
                box-shadow: 0 0 12px rgba(14, 165, 233, 0.35);
            }

            h1 {
                font-size: clamp(2rem, 4vw, 3rem);
                line-height: 1.05;
                font-weight: 600;
                margin-bottom: 0.8rem;
            }

            .hero p {
                font-size: 1rem;
                line-height: 1.8;
                color: var(--muted);
                max-width: 44rem;
            }

            .paper-list {
                list-style: none;
                display: grid;
                gap: 0.9rem;
            }

            .paper-card {
                background: var(--surface-strong);
                border: 1px solid var(--border);
                border-radius: 20px;
                overflow: hidden;
                box-shadow: 0 16px 32px rgba(148, 196, 224, 0.12);
            }

            .paper-link {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 1rem;
                padding: 1.2rem 1.4rem;
                text-decoration: none;
                color: inherit;
                transition:
                    background 0.2s ease,
                    border-color 0.2s ease,
                    transform 0.2s ease,
                    box-shadow 0.2s ease;
            }

            .paper-link:hover {
                background: var(--surface-hover);
                transform: translateX(5px);
            }

            .paper-copy {
                min-width: 0;
            }

            .paper-type {
                display: inline-block;
                font-family: "JetBrains Mono", monospace;
                font-size: 0.72rem;
                color: var(--cyan);
                margin-bottom: 0.5rem;
                letter-spacing: 0.05em;
                text-transform: uppercase;
            }

            .paper-title {
                display: block;
                font-size: 1rem;
                line-height: 1.5;
                color: #1d3d57;
                overflow-wrap: anywhere;
            }

            .paper-arrow {
                color: var(--muted);
                font-size: 1rem;
                flex-shrink: 0;
            }

            .paper-link:hover .paper-arrow {
                color: var(--cyan);
            }

            @media (max-width: 640px) {
                body {
                    padding: 1.5rem 1rem 2.5rem;
                }

                .hero {
                    padding: 1.4rem;
                    border-radius: 20px;
                }

                .paper-link {
                    padding: 1rem 1.1rem;
                }
            }
        </style>
    </head>
    <body>
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="grid"></div>
        <div class="spotlight" id="spotlight"></div>
        <main class="shell">
            <a class="back-link" href="../">← Back to home</a>
            <section class="hero">
                <div class="eyebrow">
                    <span class="eyebrow-dot"></span>
                    Papers
                </div>
                <h1>Selected papers</h1>
                <p>
                    A simple index of the papers currently published in the
                    site&apos;s <code>papers</code> folder.
                </p>
            </section>
            <ul class="paper-list">
                <li class="paper-card">
                    <a
                        class="paper-link"
                        href="ServantLeadershipasExemplarLeadership.pdf"
                    >
                        <span class="paper-copy">
                            <span class="paper-type">PDF</span>
                            <span class="paper-title">
                                Servant Leadership as Exemplar Leadership
                            </span>
                        </span>
                        <span class="paper-arrow">→</span>
                    </a>
                </li>
                <li class="paper-card">
                    <a class="paper-link" href="TheCollectiveServant.pdf">
                        <span class="paper-copy">
                            <span class="paper-type">PDF</span>
                            <span class="paper-title">
                                The Collective Servant
                            </span>
                        </span>
                        <span class="paper-arrow">→</span>
                    </a>
                </li>
            </ul>
        </main>
        <script>
            const s = document.getElementById("spotlight");
            document.addEventListener("mousemove", (e) => {
                s.style.setProperty("--mx", e.clientX + "px");
                s.style.setProperty("--my", e.clientY + "px");
            });
        </script>
    </body>
</html>
