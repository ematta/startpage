<html lang="en" data-qb-installed="true">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="x-ua-compatible" content="ie=edge" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />
        <title>Enrique Matta</title>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap");
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --bg: #eaf6ff;
                --surface: rgba(255, 255, 255, 0.72);
                --surface-hover: rgba(186, 230, 253, 0.65);
                --border: rgba(56, 189, 248, 0.18);
                --border-hover: rgba(14, 165, 233, 0.42);
                --sky: #38bdf8;
                --cyan: #0ea5e9;
                --text: #12324a;
                --muted: #5f7f98;
                --glow: 0 20px 42px rgba(56, 189, 248, 0.22);
            }
            html,
            body {
                min-height: 100vh;
            }
            body {
                background:
                    radial-gradient(
                        circle at top right,
                        rgba(125, 211, 252, 0.48) 0%,
                        transparent 38%
                    ),
                    radial-gradient(
                        circle at bottom left,
                        rgba(186, 230, 253, 0.78) 0%,
                        transparent 42%
                    ),
                    linear-gradient(
                        180deg,
                        #f9fdff 0%,
                        var(--bg) 56%,
                        #dbeffd 100%
                    );
                color: var(--text);
                font-family:
                    "Inter",
                    system-ui,
                    -apple-system,
                    sans-serif;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 2rem;
                overflow: hidden;
                position: relative;
            }
            /* ── Aurora blobs ───────────────────────────────────── */
            .blob {
                position: fixed;
                border-radius: 50%;
                filter: blur(90px);
                pointer-events: none;
                z-index: 0;
                will-change: transform;
            }
            .blob-1 {
                width: 560px;
                height: 560px;
                background: radial-gradient(
                    circle,
                    rgba(56, 189, 248, 0.2) 0%,
                    transparent 70%
                );
                top: -180px;
                right: -120px;
                animation: float1 16s ease-in-out infinite;
            }
            .blob-2 {
                width: 440px;
                height: 440px;
                background: radial-gradient(
                    circle,
                    rgba(14, 165, 233, 0.16) 0%,
                    transparent 70%
                );
                bottom: -120px;
                left: -120px;
                animation: float2 20s ease-in-out infinite;
            }
            .blob-3 {
                width: 320px;
                height: 320px;
                background: radial-gradient(
                    circle,
                    rgba(186, 230, 253, 0.32) 0%,
                    transparent 70%
                );
                top: 50%;
                left: 50%;
                animation: float3 13s ease-in-out infinite;
            }
            @keyframes float1 {
                0%,
                100% {
                    transform: translate(0, 0);
                }
                33% {
                    transform: translate(-28px, 32px);
                }
                66% {
                    transform: translate(18px, -22px);
                }
            }
            @keyframes float2 {
                0%,
                100% {
                    transform: translate(0, 0);
                }
                33% {
                    transform: translate(38px, -28px);
                }
                66% {
                    transform: translate(-18px, 38px);
                }
            }
            @keyframes float3 {
                0%,
                100% {
                    transform: translate(-50%, -50%);
                }
                50% {
                    transform: translate(-53%, -47%);
                }
            }
            /* ── Subtle grid ────────────────────────────────────── */
            .grid {
                position: fixed;
                inset: 0;
                background-image:
                    linear-gradient(
                        rgba(14, 165, 233, 0.05) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        90deg,
                        rgba(14, 165, 233, 0.05) 1px,
                        transparent 1px
                    );
                background-size: 52px 52px;
                pointer-events: none;
                z-index: 0;
            }
            /* ── Mouse spotlight ────────────────────────────────── */
            .spotlight {
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 0;
                background: radial-gradient(
                    600px circle at var(--mx, 50%) var(--my, 50%),
                    rgba(56, 189, 248, 0.14) 0%,
                    transparent 60%
                );
                transition: background 0.1s ease;
            }
            /* ── Main container ─────────────────────────────────── */
            .container {
                position: relative;
                z-index: 1;
                max-width: 40rem;
                width: 100%;
            }
            .hero {
                display: flex;
                align-items: center;
                gap: 1rem;
                margin-bottom: 2.25rem;
                min-width: 0;
                animation: fadeUp 0.6s ease 0.1s both;
            }
            /* ── Portrait badge ─────────────────────────────────── */
            .monogram {
                width: clamp(3.25rem, 10vw, 4.25rem);
                height: clamp(3.25rem, 10vw, 4.25rem);
                border-radius: 50%;
                display: inline-block;
                overflow: hidden;
                position: relative;
                animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
                box-shadow: 0 18px 36px rgba(56, 189, 248, 0.22);
                border: 2px solid rgba(248, 252, 255, 0.9);
                background: linear-gradient(135deg, var(--sky), var(--cyan));
                flex: 0 0 auto;
            }
            .monogram img {
                width: 100%;
                height: 100%;
                display: block;
                object-fit: cover;
                object-position: center 22%;
            }
            .monogram::after {
                content: "";
                position: absolute;
                inset: -2px;
                border-radius: 50%;
                background: linear-gradient(135deg, var(--sky), var(--cyan));
                z-index: -1;
                filter: blur(12px);
                opacity: 0.55;
                animation: pulse 3s ease-in-out infinite;
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 0.55;
                }
                50% {
                    opacity: 0.8;
                }
            }
            @keyframes popIn {
                from {
                    opacity: 0;
                    transform: scale(0.7);
                }
                to {
                    opacity: 1;
                    transform: scale(1);
                }
            }
            /* ── Greeting ───────────────────────────────────────── */
            .greeting {
                flex: 1;
                min-width: 0;
            }
            .greeting p {
                font-size: clamp(1rem, 1.2rem + 1vw, 1.95rem);
                font-weight: 300;
                line-height: 1.15;
                color: #5f7f98;
                letter-spacing: -0.03em;
                white-space: nowrap;
            }
            .greeting .name {
                font-weight: 500;
                background: linear-gradient(90deg, var(--sky), var(--cyan));
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
            @media (max-width: 640px) {
                body {
                    padding: 1.25rem;
                }
                .hero {
                    gap: 0.75rem;
                }
            }
            @media (max-width: 420px) {
                body {
                    padding: 1rem;
                }
                .hero {
                    gap: 0.625rem;
                }
            }
            /* ── Divider ────────────────────────────────────────── */
            .divider {
                height: 1px;
                background: linear-gradient(
                    90deg,
                    transparent,
                    var(--border),
                    transparent
                );
                margin-bottom: 1.5rem;
                animation: fadeUp 0.6s ease 0.15s both;
            }
            /* ── Links ──────────────────────────────────────────── */
            .links {
                display: flex;
                flex-direction: column;
                gap: 0.45rem;
            }
            .link {
                display: flex;
                align-items: center;
                justify-content: space-between;
                text-decoration: none;
                color: #1d3d57;
                padding: 0.8rem 1.1rem;
                border-radius: 10px;
                border: 1px solid var(--border);
                background: var(--surface);
                backdrop-filter: blur(8px);
                box-shadow: 0 14px 28px rgba(148, 196, 224, 0.16);
                transition:
                    background 0.2s ease,
                    border-color 0.2s ease,
                    color 0.2s ease,
                    transform 0.2s ease,
                    box-shadow 0.2s ease;
                will-change: transform;
                animation: fadeUp 0.55s ease both;
            }
            .link:nth-child(1) {
                animation-delay: 0.2s;
            }
            .link:nth-child(2) {
                animation-delay: 0.25s;
            }
            .link:nth-child(3) {
                animation-delay: 0.3s;
            }
            .link:nth-child(4) {
                animation-delay: 0.35s;
            }
            .link:nth-child(5) {
                animation-delay: 0.4s;
            }
            .link:nth-child(6) {
                animation-delay: 0.45s;
            }
            .link:hover {
                background: var(--surface-hover);
                border-color: var(--border-hover);
                color: var(--cyan);
                transform: translateX(5px);
                box-shadow: var(--glow);
            }
            .link-label {
                display: flex;
                align-items: center;
                gap: 0.65rem;
                font-family: "JetBrains Mono", monospace;
                font-size: 0.875rem;
                letter-spacing: 0.01em;
            }
            .link-dot {
                width: 5px;
                height: 5px;
                border-radius: 50%;
                background: var(--muted);
                flex-shrink: 0;
                transition:
                    background 0.2s ease,
                    box-shadow 0.2s ease;
            }
            .link:hover .link-dot {
                background: var(--cyan);
                box-shadow: 0 0 10px rgba(14, 165, 233, 0.35);
            }
            .link-arrow {
                font-size: 0.85rem;
                color: var(--muted);
                transition:
                    color 0.2s ease,
                    transform 0.2s ease;
                line-height: 1;
            }
            .link:hover .link-arrow {
                color: var(--cyan);
                transform: translateX(3px);
            }
            /* ── Footer ─────────────────────────────────────────── */
            .footer {
                margin-top: 1.75rem;
                display: flex;
                align-items: center;
                gap: 0.75rem;
                animation: fadeUp 0.55s ease 0.45s both;
            }
            .footer-line {
                flex: 1;
                height: 1px;
                background: linear-gradient(90deg, transparent, var(--border));
            }
            .footer-sig {
                font-family: "JetBrains Mono", monospace;
                font-size: 0.68rem;
                color: var(--muted);
                letter-spacing: 0.04em;
            }
            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(16px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
    </head>
    <body>
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="grid"></div>
        <div class="spotlight" id="spotlight"></div>
        <main class="container">
            <div class="hero">
                <div class="monogram">
                    <img src="me.jpeg" alt="Portrait of Enrique Matta" />
                </div>
                <div class="greeting">
                    <p id="headline-text">
                        Hello friends! This is
                        <span class="name">Enrique Matta</span>'s page.
                    </p>
                </div>
            </div>
            <div class="divider"></div>
            <nav class="links">
                <a href="https://blog.matta.dev" class="link">
                    <span class="link-label"
                        ><span class="link-dot"></span>Blog (coming soon)</span
                    >
                    <span class="link-arrow">→</span>
                </a>
                <a href="https://github.com/ematta" class="link">
                    <span class="link-label"
                        ><span class="link-dot"></span>GitHub</span
                    >
                    <span class="link-arrow">→</span>
                </a>
                <a href="https://linkedin.com/in/enriquematta" class="link">
                    <span class="link-label"
                        ><span class="link-dot"></span>LinkedIn</span
                    >
                    <span class="link-arrow">→</span>
                </a>
                <a href="https://brainstorm.matta.dev" class="link">
                    <span class="link-label"
                        ><span class="link-dot"></span>Brainstorm</span
                    >
                    <span class="link-arrow">→</span>
                </a>
                <a href="papers/" class="link">
                    <span class="link-label"
                        ><span class="link-dot"></span>Papers</span
                    >
                    <span class="link-arrow">→</span>
                </a>
                <a href="https://swaddle.dev" class="link">
                    <span class="link-label"
                        ><span class="link-dot"></span>Swaddle.dev</span
                    >
                    <span class="link-arrow">→</span>
                </a>
            </nav>
            <div class="footer">
                <div class="footer-line"></div>
                <span class="footer-sig">matta.dev</span>
            </div>
        </main>
        <script>
            const s = document.getElementById("spotlight");
            const headline = document.getElementById("headline-text");

            const fitHeadline = () => {
                if (!headline) {
                    return;
                }

                headline.style.fontSize = "";

                const minSize = 12;
                let fontSize = parseFloat(getComputedStyle(headline).fontSize);

                while (headline.scrollWidth > headline.clientWidth && fontSize > minSize) {
                    fontSize = Math.max(minSize, fontSize - 0.25);
                    headline.style.fontSize = `${fontSize}px`;
                }
            };

            document.addEventListener("mousemove", (e) => {
                s.style.setProperty("--mx", e.clientX + "px");
                s.style.setProperty("--my", e.clientY + "px");
            });

            fitHeadline();
            window.addEventListener("load", fitHeadline);
            window.addEventListener("resize", fitHeadline);
        </script>
    </body>
</html>
